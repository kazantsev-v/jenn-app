<style>
  body { background-color: #0E0E0F; color: #F9F8F6; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .glass-panel { background: rgba(28,28,30,0.4); backdrop-filter: blur(20px); border: 1px solid rgba(220,199,161,0.08); transition: all 0.3s ease; }
  .glass-panel:hover { border-color: rgba(220,199,161,0.15); }
  .pipeline-line { background: linear-gradient(90deg, transparent, rgba(220,199,161,0.2), transparent); height: 1px; }
  .pipeline-shell { max-width: 1440px; margin: 0 auto; width: 100%; }
  .pipeline-grid { display: grid; gap: 16px; align-items: start; }
  @media (min-width: 1280px) {
    .pipeline-grid { grid-template-columns: minmax(280px, 1fr) minmax(320px, 380px) minmax(280px, 1fr); gap: 24px; }
  }
  @media (max-width: 1279px) {
    .pipeline-grid { grid-template-columns: 1fr; }
    .pipeline-column { order: unset; }
  }
  .hub-surface { background: linear-gradient(180deg, rgba(35,35,38,0.95), rgba(22,22,24,0.96)); border: 1px solid rgba(220,199,161,0.12); }
  .hub-note { background: rgba(14,14,15,0.7); border: 1px solid rgba(220,199,161,0.12); }
  .tab-pill { border: 1px solid rgba(220,199,161,0.12); background: rgba(14,14,15,0.7); color: #9CA3AF; }
  .tab-pill.active { border-color: rgba(220,199,161,0.4); color: #DCC7A1; background: rgba(220,199,161,0.06); }
  .pulse-gold { box-shadow: 0 0 0 0 rgba(220,199,161,0.4); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220,199,161,0.4); } 70% { box-shadow: 0 0 0 15px rgba(220,199,161,0); } 100% { box-shadow: 0 0 0 0 rgba(220,199,161,0); } }
  .sidebar-active { color: #DCC7A1 !important; background: rgba(220,199,161,0.05); }
  .scroll-hide::-webkit-scrollbar { display: none; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 12px; font-size: 13px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; background: rgba(28,28,30,0.9); border: 1px solid rgba(220,199,161,0.15); color: #F9F8F6; }
  .toast.show { opacity: 1; }
  .toast-success { border-color: rgba(135,197,197,0.4); }
  .toast-error { border-color: rgba(186,26,26,0.4); color: #ffb4ab; }
  .logs-console { background: #0a0a0b; border: 1px solid #2D2D30; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; height: 60vh; overflow-y: auto; padding: 12px; white-space: pre-wrap; word-break: break-all; }
  .logs-console .log-entry { padding: 3px 0; line-height: 1.6; display: flex; gap: 6px; }
  .logs-console .log-time { color: #9CA3AF; flex-shrink: 0; }
  .logs-console .log-icon { flex-shrink: 0; width: 20px; text-align: center; }
  .logs-console .log-text { color: #F9F8F6; }
  .logs-console .log-detail { color: #9CA3AF; font-size: 11px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 500; }
  .modal { background: #1C1C1E; border: 1px solid #2D2D30; border-radius: 18px; width: 600px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
  .modal.modal-lg { width: 760px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #2D2D30; }
  .modal-body { padding: 24px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 24px; border-top: 1px solid #2D2D30; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #9CA3AF; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; background: #0E0E0F; border: 1px solid #2D2D30; border-radius: 12px; color: #F9F8F6; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border 0.2s; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #DCC7A1; }
  .mobile-drawer { transform: translateX(100%); transition: transform 0.25s ease; }
  .mobile-drawer.open { transform: translateX(0); }
  .mobile-nav-item.active { color: #DCC7A1; }
  .tooltip-bubble { pointer-events: none; position: absolute; z-index: 50; border-radius: 12px; border: 1px solid #2D2D30; background: #232326; padding: 8px 12px; font-size: 12px; line-height: 1.5; color: #9CA3AF; opacity: 0; transition: opacity 0.2s; }
  .group:hover .tooltip-bubble { opacity: 1; }
  @media (max-width: 767px) {
    body { overflow: hidden; }
    .modal-overlay { align-items: flex-end; }
    .modal { width: 100%; max-width: 100%; max-height: 88dvh; border-radius: 18px 18px 0 0; }
    .modal-header { padding: 16px 20px; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 14px 20px; flex-wrap: wrap; }
    .modal-footer button { flex: 1; min-width: 0; text-align: center; }
    .toast { bottom: 88px; right: 16px; left: 16px; text-align: center; }
    .logs-console { height: calc(100dvh - 230px); font-size: 11px; }
    .tooltip-bubble { left: 0 !important; transform: none !important; bottom: 100% !important; margin-bottom: 8px; width: max-content; max-width: 280px; }
  }
</style>
</head>
<body class="font-body-md text-body-md overflow-hidden">

<!-- AUTH SCREEN -->
<div id="auth-screen" class="flex items-center justify-center h-screen w-screen p-4">
  <div class="glass-panel p-6 sm:p-10 rounded-2xl w-full max-w-[400px] text-center">
    <h1 class="font-headline-md text-4xl text-primary italic mb-2">Jenn</h1>
    <p class="text-on-surface-variant text-sm mb-8" id="auth-subtitle">Sign in to your console</p>
    <div id="auth-alert"></div>
    <div id="login-form">
      <div class="form-group text-left">
        <label id="lbl-login-user">Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username">
      </div>
      <div class="form-group text-left">
        <label id="lbl-login-pass">Password</label>
        <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button onclick="login()" class="w-full py-3 bg-primary text-on-primary rounded-xl font-medium hover:opacity-90 transition-all mt-2" id="btn-login">Sign in</button>
      <p class="text-on-surface-variant text-xs mt-4" id="login-footer">No account? <a onclick="showRegister()" class="text-primary cursor-pointer hover:underline">Register</a></p>
    </div>
    <div id="register-form" class="hidden">
      <div class="form-group text-left">
        <label id="lbl-reg-user">Username</label>
        <input type="text" id="reg-username" placeholder="your_username" autocomplete="off">
      </div>
      <div class="form-group text-left">
        <label id="lbl-reg-pass">Password</label>
        <input type="password" id="reg-password" placeholder="••••" autocomplete="new-password">
      </div>
      <button onclick="register()" class="w-full py-3 bg-primary text-on-primary rounded-xl font-medium hover:opacity-90 transition-all mt-2" id="btn-register">Create account</button>
      <p class="text-on-surface-variant text-xs mt-4" id="reg-footer">Have an account? <a onclick="showLogin()" class="text-primary cursor-pointer hover:underline">Sign in</a></p>
    </div>
    <button onclick="toggleLang()" class="mt-6 w-8 h-8 mx-auto rounded-full border border-outline-variant text-on-surface-variant hover:text-primary hover:border-primary transition-all flex items-center justify-center text-xs font-bold" id="lang-toggle">EN</button>
  </div>
</div>

<!-- APP LAYOUT -->

    <nav class="flex-1 space-y-1" id="sidebar-nav">

      <a onclick="navigate('settings')" class="sidebar-nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary transition-all duration-300 cursor-pointer" data-page="settings" id="settings-nav" data-nav-key="nav.settings">
        <span class="material-symbols-outlined text-[20px]">settings</span>
        <span class="font-medium">Settings</span>
      </a>
      <div id="dev-nav" class="hidden">

        <span class="font-medium" id="sidebar-lang-label">EN</span>

// ── API ──
function getHeaders() {
  return { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) };
}

async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  _dbg(`${method} ${API}${path}`);
  const res = await fetch(`${API}${path}`, opts);
  let data = null;
  const text = await res.text();
  try { data = text ? JSON.parse(text) : null; } catch { data = { message: text || res.statusText }; }
  _dbg(`  → ${res.status}: ${JSON.stringify(data).slice(0, 200)}`);
  return { status: res.status, ok: res.ok, data };
}

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type === 'success' ? 'toast-success' : type === 'error' ? 'toast-error' : ''}`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const { status, data } = await api('POST', '/login', { username, password });
  if (status !== 200) {
    document.getElementById('auth-alert').innerHTML = `<div class="text-error text-sm mb-3">${data.message || t('auth.login_failed')}</div>`;
    return;
  }
  token = data.token;
  localStorage.setItem('jenn-console-token', token);
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateStaticUI();
  navigate('dashboard');
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const { status, data } = await api('POST', '/register', { username, password });
  if (status !== 201) {
    document.getElementById('auth-alert').innerHTML = `<div class="text-error text-sm mb-3">${data.message || t('auth.register_failed')}</div>`;
    return;
  }
  token = data.token;
  localStorage.setItem('jenn-console-token', token);
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateStaticUI();
  navigate('dashboard');
}

async function logout() {
  await api('POST', '/logout');
  token = null;
  localStorage.removeItem('jenn-console-token');
  if (logsEventSource) { logsEventSource.close(); logsEventSource = null; }
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// Auto-login: restore token from localStorage, or get fresh token from cookie
token = localStorage.getItem('jenn-console-token');
applyAuthUI();
api('GET', '/config').then(async ({ status }) => {
  if (status === 200) {
    if (!token) {
      const { data } = await api('GET', '/token');
      if (data?.token) {
        token = data.token;
        localStorage.setItem('jenn-console-token', token);
      }
    }
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    updateStaticUI();
    navigate('dashboard');
  } else {
    token = null;
    localStorage.removeItem('jenn-console-token');
  }
});

// ── Navigation ──
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-nav-item').forEach(el => el.classList.remove('sidebar-active'));
  document.querySelectorAll('.mobile-nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`.sidebar-nav-item[data-page="${page}"]`).forEach(el => el.classList.add('sidebar-active'));
  document.querySelectorAll(`.mobile-nav-item[data-page="${page}"]`).forEach(el => el.classList.add('active'));
  const mobileLabel = document.getElementById('mobile-page-label');
  if (mobileLabel) mobileLabel.textContent = ({ dashboard: t('nav.dashboard'), pipeline: t('nav.pipeline'), marketplace: t('nav.marketplace'), activity: t('nav.activity'), logs: t('nav.logs'), apikeys: t('nav.apikeys'), settings: t('nav.settings'), test: t('nav.devtest') })[page] || 'Console';
  closeMobileDrawer();
  const main = document.getElementById('main-content');
  main.scrollTop = 0;
  if (logsEventSource) { logsEventSource.close(); logsEventSource = null; }
  switch(page) {
    case 'dashboard': renderDashboard(main); break;
    case 'pipeline': renderPipeline(main); break;
    case 'marketplace': renderMarketplace(main); break;
    case 'activity': renderActivity(main); break;
    case 'logs': renderLogs(main); break;
    case 'apikeys': renderApiKeys(main); break;
    case 'settings': renderSettings(main); break;
    case 'test': renderTest(main); break;
  }
}

function toggleMobileDrawer() {
  const drawer = document.getElementById('mobile-drawer');
  const open = drawer.classList.toggle('open');
  drawer.setAttribute('aria-hidden', String(!open));
}

function closeMobileDrawer() {
  const drawer = document.getElementById('mobile-drawer');
  if (!drawer) return;
  drawer.classList.remove('open');
  drawer.setAttribute('aria-hidden', 'true');
}

function showModal(title, bodyHtml, footerHtml = '', options = {}) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  const sizeClass = options.large ? ' modal-lg' : '';
  overlay.innerHTML = `<div class="modal${sizeClass}"><div class="modal-header"><h2 class="font-medium text-on-surface text-lg">${title}</h2><button onclick="this.closest('.modal-overlay').remove()" class="text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined">close</span></button></div><div class="modal-body">${bodyHtml}</div>${footerHtml ? `<div class="modal-footer" id="modal-footer">${footerHtml}</div>` : ''}</div>`;
  document.body.appendChild(overlay);
  return overlay;
}

async function submitMarketplaceRequest() {
  const payload = {
    type: activeMarketplaceType,
    title: document.getElementById('marketplace-request-title')?.value.trim() || '',
    repositoryUrl: document.getElementById('marketplace-request-repository')?.value.trim() || '',
    description: document.getElementById('marketplace-request-description')?.value.trim() || '',
    documentationUrl: document.getElementById('marketplace-request-docs')?.value.trim() || '',
  }

  const { status, data } = await api('POST', '/marketplace-requests', payload)
  if (status !== 201) {
    toast(t('misc.request_failed'), 'error')
    return
  }

  toast(t('misc.request_submitted'), 'success')
  closeModal()
}

function refreshSkillTemplatePreview() {
  const name = document.getElementById('skill-create-name')?.value.trim() || 'custom_skill'
  const description = document.getElementById('skill-create-description')?.value.trim() || 'Custom Jenn skill'
  const icon = document.getElementById('skill-create-icon')?.value.trim() || '⚡'
  const paramsText = document.getElementById('skill-create-params')?.value.trim() || '{}'
  let paramsOk = true
  try { JSON.parse(paramsText || '{}') } catch { paramsOk = false }
  if (!paramsOk) return
  const code = skillTemplateCode(name, description, paramsText, icon)
  const codeEl = document.getElementById('skill-create-code')
  if (codeEl && !codeEl.dataset.manualEdit) codeEl.value = code
}

async function submitSkillCreation() {
  const name = document.getElementById('skill-create-name')?.value.trim() || ''
  const description = document.getElementById('skill-create-description')?.value.trim() || ''
  const icon = document.getElementById('skill-create-icon')?.value.trim() || '⚡'
  const paramsText = document.getElementById('skill-create-params')?.value.trim() || '{}'
  const code = document.getElementById('skill-create-code')?.value || ''

  if (!name) {
    toast(t('misc.skill_name_required'), 'error')
    return
  }
  if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name)) {
    toast(t('misc.name_invalid'), 'error')
    return
  }
  if (!code.trim()) {
    toast(t('misc.code_required'), 'error')
    return
  }

  let params = {}
  try {
    params = JSON.parse(paramsText || '{}')
  } catch {
    toast(t('misc.params_invalid'), 'error')
    return
  }

  try {
    const { status, data } = await api('POST', '/skills/create', {
      name,
      description,
      icon,
      title: name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
      params,
      code,
    })

    if (status !== 201) {
      toast(data?.message || 'Skill creation failed', 'error')
      return
    }

    toast(t('misc.skill_created'), 'success')
    closeModal()
    navigate('pipeline')
  } catch (err) {
    toast(t('misc.skill_created') + ': ' + (err.message || 'network error'), 'error')
  }
}

async function installSkill(name) {
  try {
    const { ok, data } = await api('POST', '/skills/' + encodeURIComponent(name) + '/install')
    if (!ok) return toast(data?.message || 'Install failed', 'error')
    toast(t('misc.installed'), 'success')
    closeModal()
    navigate(currentPage === 'pipeline' ? 'pipeline' : currentPage)
  } catch (err) {
    toast(t('misc.install_failed') + ': ' + (err.message || 'network error'), 'error')
  }
}

async function uninstallSkill(name) {
  if (!confirm(`${t('misc.remove_skill_confirm')} "${name}" ${t('misc.from_pipeline')}`)) return
  try {
    const { ok, data } = await api('DELETE', '/skills/' + encodeURIComponent(name))
    if (!ok) return toast(data?.message || 'Remove failed', 'error')
    toast(t('misc.removed'), 'success')
    closeModal()
    navigate(currentPage === 'pipeline' ? 'pipeline' : currentPage)
  } catch (err) {
    toast(t('misc.remove_failed') + ': ' + (err.message || 'network error'), 'error')
  }
}

document.addEventListener('input', (event) => {
  if (!event.target) return
  if (event.target.id === 'skill-create-name' || event.target.id === 'skill-create-description' || event.target.id === 'skill-create-icon' || event.target.id === 'skill-create-params') {
    if (event.target.id !== 'skill-create-code') refreshSkillTemplatePreview()
  }
  if (event.target.id === 'skill-create-code') {
    event.target.dataset.manualEdit = 'true'
  }
})

function marketplaceCard(item, type, installed) {
  const name = escapeHtml(item.name);
  const title = escapeHtml(item.title || item.name);
  const description = escapeHtml(item.description || '');
  const icon = escapeHtml(item.icon || (type === 'input' ? 'Input' : 'Output'));
  const configure = type === 'input' ? 'openInputConfig' : 'openOutputConfig';
  const install = type === 'input' ? 'installInput' : 'installOutput';
  const remove = type === 'input' ? 'uninstallInput' : 'uninstallOutput';
  const primaryAction = installed
    ? `<button onclick="${configure}('${name}')" class="px-4 py-2 rounded-full bg-primary text-on-primary text-sm font-medium">${t('marketplace.configure')}</button>`
    : `<button onclick="${install}('${name}')" class="px-4 py-2 rounded-full bg-primary text-on-primary text-sm font-medium">${t('marketplace.install')}</button>`;

function appendLog(el, entry) {
  const icons = { info: 'ℹ️', warn: '⚠️', error: '❌', success: '✅', route: '🔀', process: '⚙️' };
  const colors = { error: '#ffb4ab', warn: '#DCC7A1', success: '#87C5C5' };
  const time = entry.time || new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-time">${time}</span><span class="log-icon">${icons[entry.level] || '•'}</span><span class="log-text" style="color:${colors[entry.level] || '#F9F8F6'}">${escapeHtml(entry.msg || entry.message || JSON.stringify(entry))}</span>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

  if (!currentPassword || !newPassword) return toast(t('modal.failed'), 'error');
  if (newPassword.length < 4) return toast(t('settings.password_too_short'), 'error');
  if (newPassword !== confirmPassword) return toast(t('settings.password_mismatch'), 'error');
  const { status, data } = await api('PUT', '/password', { currentPassword, newPassword });
  if (status === 200) {

}

// ── Input/Output/Skill Config Modals ──
async function openInputConfig(name) {
  const { data } = await api('GET', '/inputs/' + encodeURIComponent(name) + '/config');
  if (!data) return toast(t('modal.failed'), 'error');
  const fields = data.configFields || [];
  const config = { ...(data.config || {}) };
  if (config.bot_mode === undefined && fields.some(f => f.key === 'bot_mode')) config.bot_mode = 'self_hosted';
  let html = data.instructions || '';
  for (const f of fields) {
    const value = config[f.key] ?? '';
    const dependency = f.showIf ? Object.entries(f.showIf)[0] : null;
    const visible = !dependency || String(config[dependency[0]]) === String(dependency[1]);
    const depAttrs = dependency ? ` data-depends="${escapeHtml(dependency[0])}" data-depval="${escapeHtml(dependency[1])}"` : '';
    const style = visible ? '' : ' style="display:none"';
    let control;
    if (f.type === 'select') {
      control = `<select data-key="${escapeHtml(f.key)}" class="input-cfg-field">${(f.options || []).map(option => {
        const optionValue = typeof option === 'object' ? option.value : option;
        const optionLabel = typeof option === 'object' ? option.label : option;
        return `<option value="${escapeHtml(optionValue)}"${String(value) === String(optionValue) ? ' selected' : ''}>${escapeHtml(optionLabel)}</option>`;
      }).join('')}</select>`;
    } else {
      const type = f.secret ? 'password' : (f.type === 'number' ? 'number' : 'text');
      control = `<input type="${type}" value="${escapeHtml(value)}" data-key="${escapeHtml(f.key)}" class="input-cfg-field"${f.placeholder ? ` placeholder="${escapeHtml(f.placeholder)}"` : ''}>`;
    }
    html += `<div class="form-group"${depAttrs}${style}><label>${escapeHtml(f.label || f.key)}</label>${control}</div>`;
  }
  if (config.bot_mode === 'self_hosted') {
    html += `<div class="p-3 rounded-xl bg-surface-container-high text-xs text-on-surface-variant mb-4">${t('misc.self_hosted_note')} <code>examples/tg-bot.js</code>.</div>`;
  }
  const isBuiltInTg = name === 'tg_bot' && (config.bot_mode || 'built_in') !== 'self_hosted';
  if (data.token && !isBuiltInTg) html += `<div class="form-group" id="source-token-block"><label>Source Token</label><div class="flex gap-2"><input type="text" value="${escapeHtml(data.token)}" readonly style="font-family:'JetBrains Mono';font-size:12px"><button onclick="copyText('${escapeHtml(data.token)}')" class="px-3 rounded-xl glass-panel">${t('modal.copy')}</button></div></div>`;
  html += '<div id="input-test-result"></div>';
  const testButton = data.hasTest ? `<button onclick="testInputConnection('${escapeHtml(name)}')" class="px-5 py-2 glass-panel rounded-full text-sm">${t('modal.test')}</button>` : '';
  showModal(data.title || name, html, `${testButton}<button onclick="saveInputConfig('${escapeHtml(name)}')" class="px-5 py-2 bg-primary text-on-primary rounded-full text-sm">${t('modal.save')}</button><button onclick="closeModal()" class="px-5 py-2 glass-panel rounded-full text-sm text-on-surface">${t('modal.cancel')}</button><button onclick="deleteInput('${escapeHtml(name)}')" class="px-5 py-2 text-error text-sm">${t('modal.delete')}</button>`);
  document.querySelectorAll('.input-cfg-field').forEach(field => field.addEventListener('change', () => {

async function loadOutputDestinations(name) {
  const el = document.getElementById('output-destinations');
  if (!el) return;
  const requestId = (window._outputDestinationRequestId || 0) + 1;
  window._outputDestinationRequestId = requestId;
  el.innerHTML = `<div class="flex items-center gap-3 rounded-2xl border border-outline-variant bg-surface-container-high/60 px-4 py-4 text-sm text-on-surface-variant"><span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-primary/30 border-t-primary"></span><span>${t('misc.connecting')}</span></div>`;
  const config = { ...(window._modalOutputConfig || {}) };
  document.querySelectorAll('.output-cfg-field').forEach(field => { config[field.dataset.key] = field.value; });
  let response = null;
  let lastError = null;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      response = await Promise.race([
        api('POST', '/outputs/' + encodeURIComponent(name) + '/destinations', { config }),
        new Promise(resolve => setTimeout(() => resolve({ status: 504, data: { message: 'Request timed out' } }), 10000))
      ]);
      if (response.status === 200) break;
      lastError = response.data?.message || t('misc.load_failed');
    } catch (error) {
      lastError = error.message || t('misc.connect_failed');
    }
    if (attempt < 2) {
      el.innerHTML = `<div class="flex items-center gap-3 rounded-2xl border border-outline-variant bg-surface-container-high/60 px-4 py-4 text-sm text-on-surface-variant"><span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-primary/30 border-t-primary"></span><span>${t('misc.waiting')} ${attempt + 2} ${t('misc.of')} 3</span></div>`;
      await new Promise(resolve => setTimeout(resolve, 900 * (attempt + 1)));
    }
  }
  if (requestId !== window._outputDestinationRequestId || !document.getElementById('output-destinations')) return;
  if (!response || response.status !== 200) {
    el.innerHTML = `<div class="rounded-2xl border border-error/30 bg-error/5 px-4 py-3 text-sm text-error"><p>${escapeHtml(lastError || t('misc.load_failed'))}</p><button onclick="loadOutputDestinations('${escapeHtml(name)}')" class="mt-2 rounded-full border border-error/30 px-3 py-1 text-xs">${t('misc.retry')}</button></div>`;
    return;
  }
  const destinations = response.data?.destinations || [];
  window._modalOutputDestinations = destinations;
  if (!destinations.length) { el.innerHTML = `<p class="text-xs text-on-surface-variant">${t('misc.no_dest_found')}</p>`; return; }
  el.innerHTML = destinations.map((d, i) => `<div class="mb-3 rounded-2xl border border-outline-variant bg-surface-container-high/60 p-4 transition-colors hover:border-primary/40"><label class="flex items-start gap-3 normal-case tracking-normal font-sans text-sm text-on-surface"><input type="checkbox" class="output-destination-check mt-1 h-4 w-4 accent-primary" data-index="${i}"${d.enabled !== false ? ' checked' : ''}><span class="min-w-0"><span class="block font-medium">${d.type === 'page' ? '📄' : '🗃️'} ${escapeHtml(d.title || d.name || d.id)}</span><span class="mt-1 block text-[11px] uppercase tracking-wider text-on-surface-variant">${d.type === 'page' ? t('misc.page') : t('misc.database')}</span></span></label>${d.url ? `<a href="${escapeHtml(d.url)}" target="_blank" class="ml-7 mt-2 inline-block text-xs text-primary hover:underline">${t('misc.open_notion')}</a>` : ''}<div class="ml-7 mt-3 rounded-xl border border-outline-variant bg-surface-container-low/70 p-3"><label class="mb-1.5 block text-xs font-medium text-on-surface-variant">${t('misc.comment_for_jenn')}</label><textarea rows="3" class="output-destination-description block w-full resize-y rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm leading-5 text-on-surface outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" data-index="${i}" placeholder="${t('misc.save_placeholder')}">${escapeHtml(d.description || '')}</textarea></div></div>`).join('');
}

async function saveOutputConfig(name) {
  const fields = document.querySelectorAll('.output-cfg-field');
  const config = {};
  fields.forEach(f => config[f.dataset.key] = f.value);
  if (window._modalOutputDestinations) {
    config.destinations = window._modalOutputDestinations.map((destination, index) => ({
      ...destination,
      enabled: document.querySelector(`.output-destination-check[data-index="${index}"]`)?.checked !== false,
      description: document.querySelector(`.output-destination-description[data-index="${index}"]`)?.value || ''
    }));
    config.databases = config.destinations.filter(d => d.type === 'database').map(d => ({ id: d.id, name: d.name || d.title, database_id: d.database_id || d.notion_id, url: d.url || null, properties: d.properties || {}, categories: d.categories || [] }));
  }
  const cfg = JSON.parse(JSON.stringify(cachedConfig || {}));
  if (!cfg.outputs) cfg.outputs = {};
  cfg.outputs[name] = { ...(cfg.outputs[name] || {}), ...config };
  const { status } = await api('PUT', '/config', { config: cfg });
  let preferencesStatus = 200;
  if (status === 200 && window._modalOutputDestinations) {
    const preferencesResult = await api('PUT', '/outputs/' + encodeURIComponent(name) + '/destination-preferences', { destinations: config.destinations });
    preferencesStatus = preferencesResult.status;
  }
  if (status === 200 && preferencesStatus === 200) { cachedConfig = cfg; toast(t('modal.saved'), 'success'); closeModal(); navigate('pipeline'); }
  else toast(t('modal.failed'), 'error');
}

function renderSkillInstances() {
  const container = document.getElementById('skill-instances-list');
  if (!container) return;
  const { instances, outputs, outputDestinations } = window._skillConfigData;

  container.innerHTML = instances.map((inst, idx) => {
    const allDests = [];
    for (const outName of (inst.outputs || [])) {
      const dests = outputDestinations[outName] || [];
      dests.filter(d => d.enabled !== false).forEach(d => {
        allDests.push({ ...d, outputName: outName });
      });
    }

    return `
    <div class="glass-panel rounded-2xl p-4 sm:p-5 space-y-4" data-instance-idx="${idx}">
      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <span class="material-symbols-outlined text-primary text-[20px] flex-shrink-0">tune</span>
          <input type="text" value="${escapeHtml(inst.name)}" onchange="updateInstanceField(${idx}, 'name', this.value)" class="bg-transparent border-none text-on-surface font-medium text-sm focus:ring-0 focus:outline-none flex-1 px-0 min-w-0" placeholder="${t('skill.instance_name')}">
        </div>
        <div class="flex items-center gap-1 flex-shrink-0">
          ${instances.length > 1 ? `<button onclick="removeSkillInstance(${idx})" class="p-1.5 text-on-surface-variant hover:text-error rounded-lg transition-colors" title="${t('modal.delete')}"><span class="material-symbols-outlined text-[18px]">delete</span></button>` : ''}
        </div>
      </div>

      <div class="form-group">
        <label class="flex items-center gap-1.5">
          ${t('skill.router_instructions')}
          <span class="group relative cursor-help">
            <span class="material-symbols-outlined text-[14px] text-on-surface-variant">help_outline</span>
            <span class="tooltip-bubble">${t('skill.router_instructions_tooltip')}</span>
          </span>
        </label>
        <textarea rows="2" onchange="updateInstanceField(${idx}, 'routerInstructions', this.value)" class="block w-full resize-y rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm leading-5 text-on-surface outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20" placeholder="${t('skill.router_instructions_placeholder')}">${escapeHtml(inst.routerInstructions || '')}</textarea>
      </div>

      <div class="form-group">
        <label>${t('skill.allowed_outputs')}</label>
        <div class="flex flex-wrap gap-2 mt-1">
          ${(outputs || []).map(o => `
            <label class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border cursor-pointer transition-all text-sm ${(inst.outputs || []).includes(o) ? 'border-primary bg-primary/10 text-primary' : 'border-outline-variant bg-surface-container-low text-on-surface-variant hover:border-primary/40'}">
              <input type="checkbox" ${(inst.outputs || []).includes(o) ? 'checked' : ''} onchange="toggleInstanceOutput(${idx}, '${escapeHtml(o)}', this.checked)" class="sr-only">
              ${escapeHtml(o)}
            </label>
          `).join('') || `<span class="text-xs text-on-surface-variant">${t('skill.no_outputs_available')}</span>`}
        </div>
      </div>

      <div class="form-group">
        <label>${t('skill.fallback_destination')}</label>
        <select onchange="updateInstanceField(${idx}, 'fallbackDestination', this.value)" class="block w-full rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm text-on-surface outline-none transition focus:border-primary">
          <option value="">${t('skill.no_fallback')}</option>
          ${allDests.map(d => {
            const id = d.id || d.name || d.notion_id || '';
            const label = `${d.type === 'page' ? '📄' : '🗃️'} ${d.title || d.name || id} (${d.outputName})`;
            return `<option value="${escapeHtml(id)}"${inst.fallbackDestination === id ? ' selected' : ''}>${escapeHtml(label)}</option>`;
          }).join('')}
        </select>
      </div>

      <div class="form-group">
        <label>${t('misc.routing_mode')}</label>
        <select onchange="updateInstanceField(${idx}, 'routingMode', this.value)" class="block w-full rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm text-on-surface outline-none transition focus:border-primary">
          <option value="auto"${(inst.routingMode || 'auto') === 'auto' ? ' selected' : ''}>${t('misc.jenn_decides')}</option>
          <option value="fixed"${inst.routingMode === 'fixed' ? ' selected' : ''}>${t('misc.always_use')}</option>
        </select>
      </div>

      ${(inst.routingMode || 'auto') === 'fixed' && allDests.length ? `
      <div class="form-group">
        <label>${t('misc.default_destination')}</label>
        <select onchange="updateInstanceField(${idx}, 'destination', this.value)" class="block w-full rounded-lg border border-outline-variant bg-surface-container-low px-3 py-2 text-sm text-on-surface outline-none transition focus:border-primary">
          <option value="">${t('skill.select_destination')}</option>
          ${allDests.map(d => {
            const id = d.id || d.name || d.notion_id || '';
            const label = `${d.type === 'page' ? '📄' : '🗃️'} ${d.title || d.name || id} (${d.outputName})`;
            return `<option value="${escapeHtml(id)}"${inst.destination === id ? ' selected' : ''}>${escapeHtml(label)}</option>`;
          }).join('')}
        </select>
      </div>` : ''}
    </div>`;
  }).join('');
}

function updateInstanceField(idx, field, value) {
  if (!window._skillConfigData?.instances?.[idx]) return;
  window._skillConfigData.instances[idx][field] = value;
  if (field === 'routingMode') renderSkillInstances();
}

function toggleInstanceOutput(idx, outputName, checked) {
  if (!window._skillConfigData?.instances?.[idx]) return;
  const inst = window._skillConfigData.instances[idx];
  if (!inst.outputs) inst.outputs = [];
  if (checked) {
    if (!inst.outputs.includes(outputName)) inst.outputs.push(outputName);
  } else {
    inst.outputs = inst.outputs.filter(o => o !== outputName);
  }
  renderSkillInstances();
}

function addSkillInstance() {
  if (!window._skillConfigData) return;
  window._skillConfigData.instances.push({
    id: `inst_${Date.now()}`,
    name: t('skill.new_instance'),
    routerInstructions: '',
    outputs: [],
    destination: '',
    routingMode: 'auto',
    fallbackDestination: ''
  });
  renderSkillInstances();
}

function removeSkillInstance(idx) {
  if (!window._skillConfigData?.instances) return;
  if (window._skillConfigData.instances.length <= 1) return;
  window._skillConfigData.instances.splice(idx, 1);
  renderSkillInstances();
}

async function saveAllSkillInstances(name) {
  if (!window._skillConfigData) return;
  const { instances } = window._skillConfigData;
  const { ok, data } = await api('POST', '/skills/' + encodeURIComponent(name) + '/config', { instances });
  if (!ok) return toast(data?.message || t('misc.save_failed'), 'error');
  toast(t('misc.skill_config_saved'), 'success');
  closeModal();
  navigate('pipeline');
}

      ${installed.has(out.name) ? `<button onclick="uninstallOutput('${out.name}')" class="px-4 py-1.5 glass-panel rounded-full text-xs text-on-surface-variant">${t('modal.remove')}</button>` : `<button onclick="installOutput('${out.name}')" class="px-4 py-1.5 bg-primary text-on-primary rounded-full text-xs">${t('marketplace.install')}</button>`}
    </div>
  `).join('') || `<p class="text-on-surface-variant text-sm text-center p-4">${t('misc.no_outputs_available')}</p>`}</div>`, `<button onclick="closeModal()" class="px-5 py-2 glass-panel rounded-full text-sm text-on-surface">${t('modal.close')}</button>`);
}

async function installOutput(name) { const { ok, data } = await api('POST', '/outputs/' + encodeURIComponent(name) + '/install'); if (!ok) return toast(data?.message || t('misc.install_failed'), 'error'); closeModal(); navigate(currentPage); toast(t('marketplace.install') + ' ✓', 'success'); }
async function uninstallOutput(name) { if (!confirm(`${t('misc.remove_output_confirm')} "${name}"?`)) return; const { ok, data } = await api('DELETE', '/outputs/' + encodeURIComponent(name)); if (!ok) return toast(data?.message || t('misc.remove_failed'), 'error'); closeModal(); navigate(currentPage); toast(t('modal.removed'), 'success'); }

// ── Helpers ──
function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function timeAgo(dateStr) { if (!dateStr) return ''; const d = new Date(dateStr); const diff = (Date.now() - d.getTime()) / 1000; if (diff < 60) return t('time.just_now'); if (diff < 3600) return Math.floor(diff/60) + t('time.m_ago'); if (diff < 86400) return Math.floor(diff/3600) + t('time.h_ago'); return Math.floor(diff/86400) + t('time.d_ago'); }
function copyText(text) { navigator.clipboard.writeText(text).then(() => toast(t('misc.copied'), 'success')); }
</script>
